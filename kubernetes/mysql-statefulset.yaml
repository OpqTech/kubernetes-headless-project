apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql
  labels:
    app: mysql
    app.kubernetes.io/name: mysql
data:
  primary.cnf: |
    # Apply this config only on the primary.
    [mysqld]
    log-bin    
  replica.cnf: |
    # Apply this config only on replicas.
    [mysqld]
    super-read-only    
---

apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  ports:
  - name: mysql
    port: 3306
  clusterIP: None
  selector:
    app: mysql
  type: ClusterIP
---

apiVersion: v1
kind: Service
metadata:
  name: mysql-read
  labels:
    app: mysql
    app.kubernetes.io/name: mysql
    readonly: "true"
spec:
  ports:
  - name: mysql
    port: 3306
  selector:
    app: mysql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
spec:
  selector:
    matchLabels:
      app: mysql
      app.kubernetes.io/name: mysql
  serviceName: mysql
  replicas: 2
  template:
    metadata:
      labels:
        app: mysql
        app.kubernetes.io/name: mysql
    spec:
      initContainers:
      - name: volume-permissions
        image: busybox
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /hostdata/mysql-${HOSTNAME##*-} && chmod 777 /hostdata/mysql-${HOSTNAME##*-}
        securityContext:
          privileged: true
        volumeMounts:
        - name: host-data
          mountPath: /hostdata
      - name: init-mysql
        image: mysql:5.7
        command:
        - bash
        - "-c"
        - |
          set -ex

          [[ $HOSTNAME =~ -([0-9]+)$ ]] || exit 1
          ordinal=${BASH_REMATCH[1]}
          echo "[mysqld]" > /mnt/conf.d/server-id.cnf

          echo "server-id=$((100 + $ordinal))" >> /mnt/conf.d/server-id.cnf

          if [[ $ordinal -eq 0 ]]; then
            cp /mnt/config-map/primary.cnf /mnt/conf.d/
          else
            cp /mnt/config-map/replica.cnf /mnt/conf.d/
          fi
        volumeMounts:
        - name: conf
          mountPath: /mnt/conf.d
        - name: config-map
          mountPath: /mnt/config-map
      - name: clone-mysql
        image: percona/percona-xtrabackup:2.4
        command:
        - bash
        - "-c"
        - |
          set -ex
          [[ -d /var/lib/mysql/mysql ]] && exit 0
          [[ $HOSTNAME =~ -([0-9]+)$ ]] || exit 1
          ordinal=${BASH_REMATCH[1]}
          [[ $ordinal -eq 0 ]] && exit 0
          
          if ! command -v socat &> /dev/null; then
            microdnf install -y --setopt=install_weak_deps=0 socat || yum install -y socat || apt-get update && apt-get install -y socat
          fi
          
          peer="mysql-$(($ordinal-1)).mysql"
          max_attempts=10
          attempt=0
          
          echo "Waiting for $peer to be fully ready..."
          sleep 30
          
          while [ $attempt -lt $max_attempts ]; do
            attempt=$((attempt + 1))
            echo "Clone attempt $attempt/$max_attempts from $peer"
            
            if [ $attempt -gt 1 ]; then
              rm -rf /var/lib/mysql/*
            fi
            
            set +e
            socat TCP:$peer:3307 STDOUT 2> /tmp/socat_err.log | xbstream -x -C /var/lib/mysql 2> /tmp/xbstream_err.log
            clone_exit=$?
            set -e
            
            if [ -f /var/lib/mysql/xtrabackup_checkpoints ]; then
              echo "Clone successful on attempt $attempt"
              rm -f /tmp/socat_err.log /tmp/xbstream_err.log
              break
            fi
            
            if [ -s /tmp/socat_err.log ]; then
              echo "socat errors:"
              cat /tmp/socat_err.log
            fi
            if [ -s /tmp/xbstream_err.log ]; then
              echo "xbstream errors:"
              cat /tmp/xbstream_err.log
            fi
            
            if [ $attempt -eq $max_attempts ]; then
              echo "ERROR: Unable to clone from $peer after $max_attempts attempts"
              exit 1
            fi
            
            echo "Clone attempt $attempt failed (exit code: $clone_exit). Retrying..."
            sleep 10
          done
          
          if [ ! -f /var/lib/mysql/xtrabackup_checkpoints ]; then
            echo "ERROR: Backup extraction failed - xtrabackup_checkpoints not found"
            echo "Contents of /var/lib/mysql:"
            ls -la /var/lib/mysql/ || true
            exit 1
          fi
          
          echo "Preparing backup..."
          if ! xtrabackup --prepare --target-dir=/var/lib/mysql; then
            echo "ERROR: Failed to prepare backup"
            exit 1
          fi
          echo "Clone and prepare complete."
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
          subPath: mysql
        - name: conf
          mountPath: /etc/mysql/conf.d
      containers:
      - name: mysql
        image: mysql:5.7
        env:
        - name: MYSQL_ALLOW_EMPTY_PASSWORD
          value: "1"
        ports:
        - name: mysql
          containerPort: 3306
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
          subPath: mysql
        - name: conf
          mountPath: /etc/mysql/conf.d
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
        livenessProbe:
          exec:
            command: ["mysqladmin", "ping"]
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command: ["mysql", "-h", "127.0.0.1", "-e", "SELECT 1"]
          initialDelaySeconds: 5
          periodSeconds: 2
          timeoutSeconds: 1
      - name: xtrabackup
        image: percona/percona-xtrabackup:2.4
        ports:
        - name: xtrabackup
          containerPort: 3307
        securityContext:
          runAsUser: 0
        command:
        - bash
        - "-c"
        - |
          microdnf install -y --setopt=install_weak_deps=0 Percona-Server-client-57 socat
          set -ex
          cd /var/lib/mysql

          if [[ -f xtrabackup_slave_info && "x$(<xtrabackup_slave_info)" != "x" ]]; then
            cat xtrabackup_slave_info | sed -E 's/;$//g' > change_master_to.sql.in
            rm -f xtrabackup_slave_info xtrabackup_binlog_info
          elif [[ -f xtrabackup_binlog_info ]]; then
            CONTENT_BINLOG_INFO=$(<xtrabackup_binlog_info)
            [[ $CONTENT_BINLOG_INFO =~ ^(.*?)[[:space:]]+(.*?)$ ]] || exit 1
            rm -f xtrabackup_binlog_info xtrabackup_slave_info
            echo "CHANGE MASTER TO MASTER_LOG_FILE='${BASH_REMATCH[1]}',\
                  MASTER_LOG_POS=${BASH_REMATCH[2]}" > change_master_to.sql.in
          fi

          echo "Waiting for mysqld to be ready (accepting connections)..."
          until mysql -u root -h 127.0.0.1 -e "SELECT 1" 2>/dev/null; do 
            echo "MySQL not ready yet, waiting..."
            sleep 2
          done
          echo "MySQL is ready!"

          if [[ -f change_master_to.sql.in ]]; then
            echo "Initializing replication from clone position"
            mysql -u root -h 127.0.0.1 \
                  -e "$(<change_master_to.sql.in), \
                          MASTER_HOST='mysql-0.mysql', \
                          MASTER_USER='root', \
                          MASTER_PASSWORD='', \
                          MASTER_CONNECT_RETRY=10; \
                        START SLAVE;" || exit 1
            mv change_master_to.sql.in change_master_to.sql.orig
          fi

          echo "Starting XtraBackup server on port 3307 using socat..."
          exec socat TCP-LISTEN:3307,fork,reuseaddr EXEC:'xtrabackup --backup --slave-info --stream=xbstream --host=127.0.0.1 --user=root'
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
          subPath: mysql
        - name: conf
          mountPath: /etc/mysql/conf.d
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
      volumes:
      - name: conf
        emptyDir: {}
      - name: config-map
        configMap:
          name: mysql # Ensure you have a ConfigMap named 'mysql'
      - name: host-data
        hostPath:
          path: /data
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
